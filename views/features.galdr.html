{% layout "base" %}
    <section class="hero hero--sm">
        <h1>Features</h1>
        <p>Was Bifröst mitbringt &mdash; ohne externe Framework-Abhängigkeiten.</p>
    </section>

    <div class="container" style="padding-top:var(--sp-2xl);padding-bottom:var(--sp-3xl)">
        <div class="grid grid--auto">
            {% each $features %}
            <div class="card">
                <div class="card-header">{{ name }}</div>
                <div class="card-body">
                    <p class="text-muted text-sm">{{{ desc }}}</p>
                </div>
            </div>
            {% endeach %}
        </div>
    </div>
{% endlayout %}
